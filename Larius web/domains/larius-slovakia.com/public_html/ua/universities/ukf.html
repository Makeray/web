<!DOCTYPE html>
<html lang="uk" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Університет Констянтина Філософа (UKF) — Вступ та навчання</title>
    <meta name="description" content="Педагогіка, природничі науки та IT. Сучасний кампус.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script> tailwind.config = {{ theme: {{ extend: {{ colors: {{ brand: {{ blue: '#1B3A6B', gold: '#D4A843', light: '#F9F8F5' }} }}, fontFamily: {{ sans: ['"Montserrat"', 'sans-serif'] }} }} }} }}</script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {{ background-color: #F9F8F5; color: #1E1E1E; }}
        .reveal {{ opacity: 0; transform: translateY(30px); transition: all 0.8s; }}
        .reveal.active {{ opacity: 1; transform: translateY(0); }}
        details > summary {{ list-style: none; }}
        details > summary::-webkit-details-marker {{ display: none; }}
        *:focus-visible {{ outline: 2px solid #D4A843; outline-offset: 2px; border-radius: 4px; }}
        @media (prefers-reduced-motion: reduce) {{ .reveal {{ opacity: 1; transform: none; transition: none; }} }}
        .sr-only {{ position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border-width: 0; }}
    </style>
</head>
<body class="font-sans antialiased text-gray-900 leading-relaxed">
    <nav class="fixed w-full z-50 py-4 bg-brand-light/95 backdrop-blur border-b border-gray-200">
        <div class="container mx-auto px-6 max-w-7xl flex justify-between items-center">
            <a href="../index.html#home" class="flex items-center gap-3"><svg width="32" height="32" viewBox="0 0 100 100" fill="none" class="text-brand-blue"><path d="M25 15V85H75" stroke="currentColor" stroke-width="12" stroke-linecap="square"/><path d="M75 40L85 30M85 30H65M85 30V50" stroke="#D4A843" stroke-width="8" stroke-linecap="square"/></svg><span class="font-bold text-2xl text-brand-blue tracking-wide">Larius Slovakia</span></a>
            <div class="hidden md:flex items-center gap-6">
                <a href="#faculties" class="text-sm font-bold text-brand-blue hover:text-brand-gold transition-colors">Факультети</a>
                <a href="../index.html#contact" class="bg-brand-gold text-white px-5 py-2.5 rounded text-sm font-bold hover:bg-yellow-600">Записатися</a>
                <div class="flex items-center gap-1 border border-gray-300 rounded-lg p-0.5">
                    <a href="../../universities/ukf.html" class="px-2.5 py-1 rounded-md text-xs font-bold text-gray-500 hover:text-brand-blue hover:bg-gray-100">RU</a>
                    <a href="ukf.html" class="px-2.5 py-1 rounded-md text-xs font-bold bg-brand-blue text-white">UA</a>
                </div>
            </div>
        </div>
    </nav>
    <main class="pt-24">
        <section class="relative py-24 lg:py-36 overflow-hidden bg-brand-blue text-white">
            <div class="absolute inset-0 opacity-25"><img src="https://images.unsplash.com/photo-1541339907198-e08756dedf3f?w=800" alt="Філософа" class="w-full h-full object-cover"></div>
            <div class="container mx-auto px-6 max-w-7xl relative z-10">
                <div class="grid lg:grid-cols-2 gap-12 items-center">
                    <div class="reveal active">
                        <div class="inline-flex items-center gap-2 px-3 py-1 rounded bg-brand-gold text-white text-xs font-bold uppercase tracking-widest mb-6"><i data-lucide="graduation-cap" class="w-4 h-4"></i> Нітра</div>
                        <h1 class="font-bold text-5xl lg:text-7xl mb-8 leading-tight">Філософа</h1>
                        <p class="text-xl text-gray-300 mb-10 leading-relaxed max-w-xl">Педагогіка, природничі науки та IT. Сучасний кампус.</p>
                        <a href="../index.html#contact" class="bg-brand-gold text-white px-8 py-4 rounded-xl font-bold hover:bg-yellow-600 shadow-lg">Хочу вступити</a>
                    </div>
                    <div class="grid grid-cols-2 gap-4 reveal active delay-200">
                        <div class="bg-white/10 backdrop-blur-md p-6 rounded-2xl border border-white/20 text-center"><div class="text-brand-gold font-bold text-4xl mb-1">UK</div><div class="text-gray-300 text-xs uppercase font-bold tracking-widest">Абревіатура</div></div>
                        <div class="bg-white/10 backdrop-blur-md p-6 rounded-2xl border border-white/20 text-center"><div class="text-brand-gold font-bold text-4xl mb-1">Нітра</div><div class="text-gray-300 text-xs uppercase font-bold tracking-widest">Місто</div></div>
                    </div>
                </div>
            </div>
        </section>
        <section class="py-24 px-6 bg-brand-blue text-white text-center">
            <h2 class="text-5xl font-bold mb-8 text-white">Вступи до Філософа</h2>
            <a href="../index.html#contact" class="inline-block bg-brand-gold text-white font-bold px-12 py-5 rounded-xl hover:bg-yellow-600 transition-all shadow-2xl text-lg">Отримати консультацію</a>
        </section>
    </main>
    <footer class="bg-brand-blue text-white py-12 px-6 text-center opacity-60 text-sm">&copy; 2026 Larius Slovakia.</footer>
    <script>
        lucide.createIcons();
        const observer = new IntersectionObserver((entries) => {{ entries.forEach(entry => {{ if (entry.isIntersecting) {{ entry.target.classList.add('active'); }} }}); }}, {{ threshold: 0.1 }});
        document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));
    </script>
</body>
</html>
